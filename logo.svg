<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 52" width="220" height="52" role="img" aria-label="AI IT Logo">
  <title>AI IT - פורטל הבינה המלאכותית</title>

  <!-- Icon: Neural network mark -->
  <circle cx="26" cy="26" r="24" fill="#3B82F6"/>

  <!-- Lines (drawn before nodes so nodes sit on top) -->
  <line x1="26" y1="10" x2="26" y2="18.5" stroke="white" stroke-width="1.5" stroke-opacity="0.55"/>
  <line x1="26" y1="33.5" x2="26" y2="42" stroke="white" stroke-width="1.5" stroke-opacity="0.55"/>
  <line x1="10" y1="26" x2="18.5" y2="26" stroke="white" stroke-width="1.5" stroke-opacity="0.55"/>
  <line x1="33.5" y1="26" x2="42" y2="26" stroke="white" stroke-width="1.5" stroke-opacity="0.55"/>
  <line x1="29.5" y1="22.5" x2="36.5" y2="15.5" stroke="#F59E0B" stroke-width="1.3" stroke-opacity="0.8"/>
  <line x1="22.5" y1="29.5" x2="15.5" y2="36.5" stroke="#F59E0B" stroke-width="1.3" stroke-opacity="0.8"/>

  <!-- Cardinal nodes -->
  <circle cx="26" cy="8"  r="3.2" fill="white" opacity="0.88"/>
  <circle cx="26" cy="44" r="3.2" fill="white" opacity="0.88"/>
  <circle cx="8"  cy="26" r="3.2" fill="white" opacity="0.88"/>
  <circle cx="44" cy="26" r="3.2" fill="white" opacity="0.88"/>

  <!-- Diagonal amber accent nodes -->
  <circle cx="38.5" cy="13.5" r="2.8" fill="#F59E0B"/>
  <circle cx="13.5" cy="38.5" r="2.8" fill="#F59E0B"/>

  <!-- Center node (ring + dot) -->
  <circle cx="26" cy="26" r="5.5" fill="white"/>
  <circle cx="26" cy="26" r="2.8" fill="#3B82F6"/>

  <!-- Text -->
  <text x="65" y="37"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="36" font-weight="900" letter-spacing="-1.5"
        fill="#3B82F6">AI</text>

  <text x="121" y="37"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="36" font-weight="900" letter-spacing="-1.5"
        fill="#F59E0B">IT</text>
</svg>
